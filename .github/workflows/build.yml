name: build

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate all JSON files parse
        run: |
          set -e
          fail=0
          while IFS= read -r f; do
            if ! python3 -c "import json,sys; json.load(open(sys.argv[1]))" "$f" 2>/dev/null; then
              echo "::error file=$f::JSON parse failed"
              fail=1
            fi
          done < <(find . -type f -name '*.json' -not -path './node_modules/*' -not -path './.git/*')
          exit $fail

      - name: Validate marketplace.json schema (required fields)
        run: |
          python3 - <<'PY'
          import json, sys
          m = json.load(open('.claude-plugin/marketplace.json'))
          required = ['name', 'plugins']
          missing = [k for k in required if k not in m]
          if missing:
              print(f"::error::marketplace.json missing required keys: {missing}")
              sys.exit(1)
          if not isinstance(m['plugins'], list) or not m['plugins']:
              print("::error::marketplace.json plugins[] must be a non-empty list")
              sys.exit(1)
          for i, p in enumerate(m['plugins']):
              for k in ['name', 'source', 'version']:
                  if k not in p:
                      print(f"::error::plugins[{i}] missing required key '{k}'")
                      sys.exit(1)
          print(f"OK — marketplace.json valid, {len(m['plugins'])} plugin(s)")
          PY

      - name: Markdown sanity (no broken Markdown frontmatter)
        run: |
          set -e
          fail=0
          while IFS= read -r f; do
            # Lightweight check: if file starts with '---', verify it has a closing '---' within first 50 lines
            if head -1 "$f" | grep -q '^---$'; then
              if ! head -50 "$f" | tail -49 | grep -q '^---$'; then
                echo "::error file=$f::Markdown frontmatter opened but never closed in first 50 lines"
                fail=1
              fi
            fi
          done < <(find . -type f -name '*.md' -not -path './node_modules/*' -not -path './.git/*')
          exit $fail
